<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Pluvial</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
h1 { margin-bottom: 10px; }
input { padding: 5px; margin-bottom: 15px; width: 300px; }

.card {
  display: inline-block;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  background: #f0f0f0;
}

.ok { background: #c8f7c5; }
.bad { background: #f7c5c5; }

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: left;
}

th { background: #eee; }
</style>
</head>

<body>

<h1>Control Pluvial</h1>

<input type="text" id="buscador" placeholder="Buscar...">

<h2>Resumen por empresa</h2>
<div id="resumen"></div>

<h2>Elementos</h2>
<table>
<thead>
<tr id="headers"></tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>

// 🔗 Google Sheets en CSV
const url = "https://docs.google.com/spreadsheets/d/10DNZYFxn4pIWvggvdWa9vMmuLBJbRj1s7RKeC5xv-ag/export?format=csv&gid=0";

let datosGlobal = [];

// 📥 Cargar datos
fetch(url)
  .then(response => response.text())
  .then(csv => {
    const results = Papa.parse(csv, { header: true });
    datosGlobal = results.data.filter(d => Object.keys(d).length > 1); // limpia filas vacías

    generarTabla(datosGlobal);
    generarResumen(datosGlobal);
  })
  .catch(error => {
    console.error("Error cargando CSV:", error);
  });

// 🔍 Buscador
document.getElementById("buscador").addEventListener("input", e => {
  const texto = e.target.value.toLowerCase();

  const filtrados = datosGlobal.filter(d =>
    Object.values(d).some(v =>
      String(v).toLowerCase().includes(texto)
    )
  );

  generarTabla(filtrados);
});

// 📊 Tabla
function generarTabla(data) {
  const tabla = document.getElementById("tabla");
  const headers = document.getElementById("headers");

  tabla.innerHTML = "";
  headers.innerHTML = "";

  if (data.length === 0) return;

  // headers dinámicos
  Object.keys(data[0]).forEach(k => {
    headers.innerHTML += `<th>${k}</th>`;
  });

  // filas
  data.forEach(d => {
    let row = "<tr>";

    Object.values(d).forEach(v => {
      row += `<td>${v}</td>`;
    });

    row += "</tr>";
    tabla.innerHTML += row;
  });
}

// 📈 Resumen por empresa
function generarResumen(data) {
  const resumen = {};

  data.forEach(d => {
    const empresa = d.empresa || d.Empresa || "Sin empresa";

    const total = Number(d.cantidad_total || d.total || 0);
    const ejecutado = Number(d.cantidad_ejecutada || d.ejecutado || 0);

    if (!resumen[empresa]) {
      resumen[empresa] = { total: 0, ejecutado: 0 };
    }

    resumen[empresa].total += total;
    resumen[empresa].ejecutado += ejecutado;
  });

  let html = "";

  for (let emp in resumen) {
    const r = resumen[emp];
    if (r.total === 0) continue;

    const porcentaje = (r.ejecutado / r.total) * 100;

    html += `
      <div class="card ${porcentaje >= 100 ? 'ok' : 'bad'}">
        <b>${emp}</b><br>
        ${porcentaje.toFixed(1)}%<br>
        ${r.ejecutado} / ${r.total}
      </div>
    `;
  }

  document.getElementById("resumen").innerHTML = html;
}

</script>

</body>
</html>
