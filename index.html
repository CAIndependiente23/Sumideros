<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Pluvial</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
h1 { margin-bottom: 10px; }
input { padding: 5px; margin-bottom: 15px; width: 300px; }

.card {
  display: inline-block;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  background: #f0f0f0;
}

.ok { background: #c8f7c5; }
.bad { background: #f7c5c5; }

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: left;
}

th { background: #eee; }
</style>
</head>

<body>

<h1>Control Pluvial</h1>

<input type="text" id="buscador" placeholder="Buscar por calle...">

<h2>Resumen por empresa</h2>
<div id="resumen"></div>

<h2>Elementos</h2>
<table>
<thead>
<tr id="headers"></tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>

// 🔗 Google Sheets CSV
const url = "https://docs.google.com/spreadsheets/d/10DNZYFxn4pIWvggvdWa9vMmuLBJbRj1s7RKeC5xv-ag/export?format=csv&gid=0";

let datosGlobal = [];

// 🔍 columnas detectadas automáticamente
let colEmpresa = null;
let colEstado = null;
let colCalle = null;

// 📥 Cargar datos
fetch(url)
  .then(response => response.text())
  .then(csv => {
    const results = Papa.parse(csv, { header: true });

    datosGlobal = results.data.filter(d => Object.keys(d).length > 1);

    detectarColumnas(datosGlobal[0]);

    generarTabla(datosGlobal.slice(0, 200)); // carga inicial liviana
    generarResumen(datosGlobal);
  })
  .catch(error => console.error("Error cargando CSV:", error));

// 🧠 Detectar nombres reales de columnas
function detectarColumnas(fila) {
  const columnas = Object.keys(fila);

  columnas.forEach(c => {
    const nombre = c.toLowerCase();

    if (nombre.includes("empresa")) colEmpresa = c;
    if (nombre.includes("estado")) colEstado = c;
    if (nombre.includes("calle")) colCalle = c;
  });

  console.log("Columnas detectadas:", colEmpresa, colEstado, colCalle);
}

// 🔍 Buscador optimizado
let timeout;

document.getElementById("buscador").addEventListener("input", e => {
  clearTimeout(timeout);

  timeout = setTimeout(() => {
    const texto = e.target.value.toLowerCase();

    const filtrados = datosGlobal.filter(d =>
      String(d[colCalle] || "").toLowerCase().includes(texto)
    );

    generarTabla(filtrados.slice(0, 200)); // limita para evitar freeze
  }, 300);
});

// 📊 Tabla
function generarTabla(data) {
  const tabla = document.getElementById("tabla");
  const headers = document.getElementById("headers");

  tabla.innerHTML = "";
  headers.innerHTML = "";

  if (data.length === 0) return;

  Object.keys(data[0]).forEach(k => {
    headers.innerHTML += `<th>${k}</th>`;
  });

  data.forEach(d => {
    let row = "<tr>";

    Object.values(d).forEach(v => {
      row += `<td>${v}</td>`;
    });

    row += "</tr>";
    tabla.innerHTML += row;
  });
}

// 📈 Dashboard por empresa
function generarResumen(data) {
  const resumen = {};

  data.forEach(d => {
    const empresa = d[colEmpresa] || "Sin empresa";
    const estado = String(d[colEstado] || "").toLowerCase();

    if (!resumen[empresa]) {
      resumen[empresa] = { limpios: 0, cod28: 0, total: 0 };
    }

    if (estado.includes("limpio")) resumen[empresa].limpios++;
    if (estado.includes("28")) resumen[empresa].cod28++;

    resumen[empresa].total++;
  });

  let html = "";

  for (let emp in resumen) {
    const r = resumen[emp];

    const porcentaje = r.total > 0
      ? (r.limpios / r.total) * 100
      : 0;

    const clase = porcentaje >= 80 ? "ok" : "bad";

    html += `
      <div class="card ${clase}">
        <b>${emp}</b><br><br>
        🟢 Limpios: ${r.limpios}<br>
        🔴 Cod. 28: ${r.cod28}<br>
        📊 Total: ${r.total}<br>
        📈 % Limpios: ${porcentaje.toFixed(1)}%
      </div>
    `;
  }

  document.getElementById("resumen").innerHTML = html;
}

</script>

</body>
</html>
