<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Pluvial</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.card {
  display: inline-block;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  background: #f0f0f0;
}

.ok { background: #c8f7c5; }
.bad { background: #f7c5c5; }

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
}

th { background: #eee; }

#grafico {
  height: 320px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Control Pluvial</h1>

<label>Filtrar por empresa:</label>
<select id="filtroEmpresa">
  <option value="">Todas</option>
  <option value="UTE">UTE</option>
  <option value="RC">RC</option>
  <option value="Automat">Automat</option>
  <option value="DASA">DASA</option>
  <option value="Alemarsa">Alemarsa</option>
</select>

<br><br>

<input type="text" id="buscador" placeholder="Buscar por calle...">

<h2>Resumen por empresa</h2>
<div id="resumen">Cargando...</div>

<h2>Gráfico</h2>
<canvas id="grafico"></canvas>

<h2>Elementos</h2>
<table>
<thead><tr id="headers"></tr></thead>
<tbody id="tabla"></tbody>
</table>

<script>

// 🔗 URL CSV
const url = "https://docs.google.com/spreadsheets/d/15SPpa4npSejN88JwsCX8hou7yDbK_aejhn6ZyIviQSE/export?format=csv&gid=0";

let datosGlobal = [];
let empresaActual = "";
let chart = null;

const ordenEmpresas = ["UTE", "RC", "Automat", "DASA", "Alemarsa"];

// 🧼 limpiar texto (acentos, espacios, etc.)
function limpiarTexto(t){
  return String(t || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

// 📥 cargar CSV
fetch(url)
.then(r => r.text())
.then(csv => {

  const parsed = Papa.parse(csv, {
    header: true,
    skipEmptyLines: true
  });

  // 🔥 NORMALIZAR HEADERS
  const data = parsed.data.map(row => {
    const limpio = {};

    Object.keys(row).forEach(k => {
      const key = limpiarTexto(k);
      limpio[key] = row[k];
    });

    return limpio;
  });

  datosGlobal = data.filter(d => d && Object.keys(d).length > 1);

  console.log("Datos cargados:", datosGlobal);

  actualizarVista();
})
.catch(err => {
  console.error("Error cargando CSV:", err);
  document.getElementById("resumen").innerHTML = "❌ Error cargando datos";
});

// 🔽 filtro empresa
document.getElementById("filtroEmpresa").addEventListener("change", e => {
  empresaActual = e.target.value;
  actualizarVista();
});

// 🔍 buscador
let timeout;
document.getElementById("buscador").addEventListener("input", () => {
  clearTimeout(timeout);
  timeout = setTimeout(() => actualizarVista(), 250);
});

// 🔥 función principal
function actualizarVista(){

  let data = datosGlobal;

  if (empresaActual) {
    data = data.filter(d =>
      limpiarTexto(d["Empresa"]) === limpiarTexto(empresaActual)
    );
  }

  const texto = limpiarTexto(document.getElementById("buscador").value);

  if (texto) {
    data = data.filter(d =>
      limpiarTexto(d["Calle"]).toLowerCase().includes(texto.toLowerCase())
    );
  }

  console.log("Filtrados:", data);

  generarResumen(data);
  generarGrafico(data);
  generarTabla(data.slice(0, 100));
}

// 📊 tabla
function generarTabla(data){

  const t = document.getElementById("tabla");
  const h = document.getElementById("headers");

  t.innerHTML = "";
  h.innerHTML = "";

  if (!data.length) return;

  Object.keys(data[0]).forEach(k => {
    h.innerHTML += `<th>${k}</th>`;
  });

  data.forEach(d => {
    let row = "<tr>";
    Object.values(d).forEach(v => row += `<td>${v}</td>`);
    row += "</tr>";
    t.innerHTML += row;
  });
}

// 📈 resumen
function generarResumen(data){

  const r = {};

  data.forEach(d => {

    const emp = limpiarTexto(d["Empresa"]);
    const est = limpiarTexto(d["Estado Sumidero"]);

    if (!emp) return;

    if (!r[emp]) r[emp] = { limpios: 0, c28: 0, total: 0 };

    r[emp].total++;

    if (est === "Limpio") r[emp].limpios++;
    if (est === "Cod. 28") r[emp].c28++;
  });

  let html = "";

  ordenEmpresas.forEach(emp => {

    const key = limpiarTexto(emp);

    if (!r[key]) return;

    const p = r[key].total ? (r[key].limpios / r[key].total) * 100 : 0;
    const cls = p >= 80 ? "ok" : "bad";

    html += `
    <div class="card ${cls}">
      <b>${emp}</b><br><br>
      🟢 Limpios: ${r[key].limpios}<br>
      🔴 Cod. 28: ${r[key].c28}<br>
      📊 Total: ${r[key].total}<br>
      📈 ${p.toFixed(1)}%
    </div>`;
  });

  document.getElementById("resumen").innerHTML = html;
}

// 📊 gráfico
function generarGrafico(data){

  const agrupado = {};

  data.forEach(d => {

    const emp = limpiarTexto(d["Empresa"]);
    const est = limpiarTexto(d["Estado Sumidero"]);

    if (!emp) return;

    if (!agrupado[emp]) {
      agrupado[emp] = { limpio: 0, c28: 0 };
    }

    if (est === "Limpio") agrupado[emp].limpio++;
    if (est === "Cod. 28") agrupado[emp].c28++;
  });

  const labels = Object.keys(agrupado);

  if (!labels.length) {
    if (chart) chart.destroy();
    return;
  }

  const limpios = labels.map(e => agrupado[e].limpio);
  const c28 = labels.map(e => agrupado[e].c28);

  const ctx = document.getElementById("grafico");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [
        {
          label: "🟢 Limpios",
          data: limpios,
          backgroundColor: "#2ecc71"
        },
        {
          label: "🔴 Cod. 28",
          data: c28,
          backgroundColor: "#e74c3c"
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { stacked: true },
        y: { stacked: true, beginAtZero: true }
      }
    }
  });
}

</script>

</body>
</html>
