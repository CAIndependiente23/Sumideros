<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Pluvial</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.card {
  display: inline-block;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  background: #f0f0f0;
}

.ok { background: #c8f7c5; }
.bad { background: #f7c5c5; }

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
}

th { background: #eee; }
</style>
</head>

<body>

<h1>Control Pluvial</h1>

<input type="text" id="buscador" placeholder="Buscar por calle...">

<h2>Resumen por empresa</h2>
<div id="resumen">Cargando...</div>

<h2>Elementos</h2>
<table>
<thead><tr id="headers"></tr></thead>
<tbody id="tabla"></tbody>
</table>

<script>

const url = "https://docs.google.com/spreadsheets/d/10DNZYFxn4pIWvggvdWa9vMmuLBJbRj1s7RKeC5xv-ag/export?format=csv&gid=0";

let datosGlobal = [];
let colEmpresa, colEstado, colCalle;

// ORDEN FIJO
const ordenEmpresas = ["UTE", "RC", "Automat", "DASA", "Alemarsa"];

fetch(url)
.then(r => r.text())
.then(csv => {
  const data = Papa.parse(csv, { header: true }).data;

  datosGlobal = data.filter(d => d && Object.keys(d).length > 1);

  detectarColumnas(datosGlobal[0]);

  generarResumen(datosGlobal);
  generarTabla(datosGlobal.slice(0, 100));
});

function detectarColumnas(fila){
  Object.keys(fila).forEach(c => {
    const n = c.toLowerCase();
    if (n.includes("empresa")) colEmpresa = c;
    if (n.includes("estado")) colEstado = c;
    if (n.includes("calle")) colCalle = c;
  });
}

// 🔍 buscador
let timeout;

document.getElementById("buscador").addEventListener("input", e => {
  clearTimeout(timeout);

  timeout = setTimeout(() => {
    const texto = e.target.value.toLowerCase();

    const filtrados = datosGlobal.filter(d =>
      String(d[colCalle] || "").toLowerCase().includes(texto)
    );

    generarTabla(filtrados.slice(0, 100));
  }, 300);
});

// 📊 tabla
function generarTabla(data){
  const t = document.getElementById("tabla");
  const h = document.getElementById("headers");

  t.innerHTML = "";
  h.innerHTML = "";

  if (!data.length) return;

  Object.keys(data[0]).forEach(k => {
    h.innerHTML += `<th>${k}</th>`;
  });

  data.forEach(d => {
    let row = "<tr>";
    Object.values(d).forEach(v => row += `<td>${v}</td>`);
    row += "</tr>";
    t.innerHTML += row;
  });
}

// 📈 resumen CORREGIDO
function generarResumen(data){
  const r = {};

  data.forEach(d => {
    const emp = (d[colEmpresa] || "").trim();
    const est = String(d[colEstado] || "").toLowerCase();

    if (!emp) return;

    if (!r[emp]) r[emp] = { limpios: 0, c28: 0, total: 0 };

    // TOTAL siempre suma
    r[emp].total++;

    // SOLO cuenta cuando corresponde
    if (est.includes("limpio")) r[emp].limpios++;
    if (est.includes("28")) r[emp].c28++;
  });

  let html = "";

  // 🔥 orden fijo
  ordenEmpresas.forEach(emp => {
    if (!r[emp]) return;

    const p = r[emp].total ? (r[emp].limpios / r[emp].total) * 100 : 0;
    const cls = p >= 80 ? "ok" : "bad";

    html += `
    <div class="card ${cls}">
      <b>${emp}</b><br>
      Limpios: ${r[emp].limpios}<br>
      Cod 28: ${r[emp].c28}<br>
      Total: ${r[emp].total}<br>
      ${p.toFixed(1)}%
    </div>`;
  });

  document.getElementById("resumen").innerHTML = html;
}

</script>

</body>
</html>
