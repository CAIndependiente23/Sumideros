<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Sumideros</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #FFD700; /* Fondo Amarillo */
}

.card {
  display: inline-block;
  padding: 15px;
  margin: 5px;
  border-radius: 8px;
  background: white;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  text-align: center;
}

.ok { border-left: 10px solid #2ecc71; }
.bad { border-left: 10px solid #e74c3c; }

table {
  border-collapse: collapse;
  width: 100%;
  background: white;
  margin-top: 15px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center; /* Centrado de datos */
}

th { 
  background: #333; 
  color: white;
}

.boton-mes {
  padding: 8px 15px;
  margin-right: 5px;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  background: #eee;
}

.activo {
  background: #000;
  color: white;
}

input, select {
  padding: 8px;
  border-radius: 4px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>Estado Sumideros</h1>

<h3>Mes:</h3>
<div id="meses"></div>

<br>

<label><b>Filtrar por empresa:</b></label><br>
<select id="filtroEmpresa">
  <option value="">Todas</option>
  <option value="UTE">UTE</option>
  <option value="RC">RC</option>
  <option value="Automat">Automat</option>
  <option value="DASA">DASA</option>
  <option value="Alemarsa">Alemarsa</option>
</select>

<br>
<input type="text" id="buscador" placeholder="Buscar por calle...">
<input type="text" id="buscadorAltura" placeholder="Buscar por altura...">

<h2>Indicador gráfico</h2>
<div style="width:25vw; max-width:320px; background: white; padding: 15px; border-radius: 8px;">
  <canvas id="grafico"></canvas>
</div>

<h2>Resumen por empresa</h2>
<div id="resumen">Cargando...</div>

<h2>Elementos</h2>
<div style="overflow-x: auto;">
  <table>
    <thead><tr id="headers"></tr></thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>

const urlsPorMes = {
  "ENERO": "https://docs.google.com/spreadsheets/d/1plo7XrKfaZzkgVAu1Dy1L8zPlt5YCTGX7p5ug-gsWPg/export?format=csv&gid=0",
  "FEBRERO": "https://docs.google.com/spreadsheets/d/1PWL289FN7BRAF4Vcvs3hdxcvdCxP4Vyt0BniCpng4l8/export?format=csv",
  "MARZO": "https://docs.google.com/spreadsheets/d/1kn-haRJBsVdhUFRyDP1h3nfF3tGgf2JF1CRfw7WN0sY/export?format=csv",
  "ABRIL": "https://docs.google.com/spreadsheets/d/1loohYDVKwKe86YL_F5FKgpomi9HJcnd8MUouRgCBS0Q/export?format=csv"
};

// LISTA DE COLUMNAS A OCULTAR
const columnasAExcluir = [
  "Ano", 
  "Mes", 
  "Dia", 
  "A verificar", 
  "N° Verificacion", 
  "Fecha Verificion", 
  "Verificador", 
  "Mes de verificacion",
  "Mes de verificacion (OCULTAR)" // Añadida específicamente
];

let mesActual = "ABRIL";
let datosGlobal = [];
let empresaActual = "";
let chart;

const ordenEmpresas = ["UTE", "RC", "Automat", "DASA", "Alemarsa"];

const contMeses = document.getElementById("meses");

["GLOBAL", ...Object.keys(urlsPorMes)].forEach(mes => {
  const btn = document.createElement("button");
  btn.innerText = mes;
  btn.className = "boton-mes";
  if (mes === mesActual) btn.classList.add("activo");
  btn.onclick = () => {
    mesActual = mes;
    document.querySelectorAll(".boton-mes").forEach(b => b.classList.remove("activo"));
    btn.classList.add("activo");
    cargarDatos(mes);
  };
  contMeses.appendChild(btn);
});

function limpiarTexto(t){
  return String(t || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

function cargarDatos(mes){
  document.getElementById("resumen").innerHTML = "Cargando...";
  if (mes === "GLOBAL") {
    const promesas = Object.values(urlsPorMes).map(url =>
      fetch(url).then(r => r.text()).then(csv => Papa.parse(csv, {header: true, skipEmptyLines: true}).data)
    );
    Promise.all(promesas).then(resultados => {
      let combinado = [];
      resultados.forEach(data => {
        const limpio = data.map(row => {
          const obj = {};
          Object.keys(row).forEach(k => { obj[limpiarTexto(k)] = row[k]; });
          return obj;
        });
        combinado = combinado.concat(limpio.filter(d => d && Object.keys(d).length > 1));
      });
      datosGlobal = combinado;
      actualizarVista();
    });
    return;
  }

  fetch(urlsPorMes[mes]).then(r => r.text()).then(csv => {
    const data = Papa.parse(csv, {header: true, skipEmptyLines: true}).data.map(row => {
      const limpio = {};
      Object.keys(row).forEach(k => { limpio[limpiarTexto(k)] = row[k]; });
      return limpio;
    });
    datosGlobal = data.filter(d => d && Object.keys(d).length > 1);
    actualizarVista();
  });
}

document.getElementById("filtroEmpresa").addEventListener("change", e => {
  empresaActual = e.target.value;
  actualizarVista();
});

let timeout;
[ "buscador", "buscadorAltura" ].forEach(id => {
  document.getElementById(id).addEventListener("input", () => {
    clearTimeout(timeout);
    timeout = setTimeout(actualizarVista, 250);
  });
});

function actualizarVista(){
  let data = datosGlobal;
  if (empresaActual) data = data.filter(d => limpiarTexto(d["Empresa"]) === limpiarTexto(empresaActual));
  
  const txtC = limpiarTexto(document.getElementById("buscador").value).toLowerCase();
  if (txtC) data = data.filter(d => limpiarTexto(d["Calle"]).toLowerCase().includes(txtC));

  const txtA = limpiarTexto(document.getElementById("buscadorAltura").value).toLowerCase();
  if (txtA) data = data.filter(d => limpiarTexto(d["Altura"] || d["Altura Calle"] || "").toLowerCase().includes(txtA));

  generarResumen(data);
  generarTabla(data.slice(0, 100));
  actualizarGrafico(data);
}

function generarResumen(data){
  const r = {};
  const pliegos = { "UTE": 8211, "RC": 7028, "Automat": 5623, "DASA": 5357, "Alemarsa": 3249 };
  data.forEach(d => {
    const emp = limpiarTexto(d["Empresa"]);
    const est = limpiarTexto(d["Estado Sumidero"]);
    if (!emp) return;
    if (!r[emp]) r[emp] = { limpios: 0, c28: 0 };
    if (est === "Limpio") r[emp].limpios++;
    if (est === "Cod. 28") r[emp].c28++;
  });

  let html = "";
  ordenEmpresas.forEach(emp => {
    const key = limpiarTexto(emp);
    if (!r[key]) return;
    const {limpios, c28} = r[key];
    const visitas = limpios + c28;
    const pliego = pliegos[emp] || 0;
    const avance = pliego ? (limpios / pliego) * 100 : 0;
    const pCod28 = visitas ? (c28 / visitas) * 100 : 0;
    html += `<div class="card ${avance >= 80 ? 'ok' : 'bad'}"><b>${emp}</b><br><br>🟢 Limpios: ${limpios}<br>🔴 Cod. 28: ${c28}<br>📍 Visitas: ${visitas}<br>${mesActual !== "GLOBAL" ? `📋 Pliego: ${pliego}<br>📈 Avance: ${avance.toFixed(1)}%<br>` : ""}⚠️ % Cod. 28: ${pCod28.toFixed(1)}%</div>`;
  });
  document.getElementById("resumen").innerHTML = html;
}

function generarTabla(data){
  const t = document.getElementById("tabla");
  const h = document.getElementById("headers");
  t.innerHTML = ""; h.innerHTML = "";
  if (!data.length) return;

  // Filtrar las columnas por nombre exacto
  const headersValidos = Object.keys(data[0]).filter(k => !columnasAExcluir.includes(k));

  headersValidos.forEach(k => { h.innerHTML += `<th>${k}</th>`; });

  data.forEach(d => {
    let row = "<tr>";
    headersValidos.forEach(k => { row += `<td>${d[k] || ""}</td>`; });
    row += "</tr>";
    t.innerHTML += row;
  });
}

function actualizarGrafico(data){
  const empresas = ordenEmpresas.map(e => limpiarTexto(e));
  let labels = [], limpios = [], cod28 = [];
  empresas.forEach(emp => {
    if (empresaActual && limpiarTexto(empresaActual) !== emp) return;
    let subset = data.filter(d => limpiarTexto(d["Empresa"]) === emp);
    labels.push(emp);
    limpios.push(subset.filter(d => limpiarTexto(d["Estado Sumidero"]) === "Limpio").length);
    cod28.push(subset.filter(d => limpiarTexto(d["Estado Sumidero"]) === "Cod. 28").length);
  });
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("grafico").getContext("2d"), {
    type: "bar",
    data: { labels, datasets: [ { label: "Limpios", data: limpios, backgroundColor: "green", stack: "s" }, { label: "Cod. 28", data: cod28, backgroundColor: "red", stack: "s" } ] },
    options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true } } }
  });
}

cargarDatos(mesActual);
</script>

</body>
</html>
