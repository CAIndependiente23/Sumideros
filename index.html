<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Sumideros</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- MAPA -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #FFD700;
}

/* MAPA ARRIBA DERECHA */
#mapaContainer {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 20vw;
  height: 220px;
  z-index: 1000;
}
#mapa {
  height: 100%;
  width: 100%;
  border-radius: 8px;
  border: 2px solid white;
}

.card {
  display: inline-block;
  padding: 15px;
  margin: 5px;
  border-radius: 8px;
  background: white;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  text-align: center;
}

.ok { border-left: 10px solid #2ecc71; }
.bad { border-left: 10px solid #e74c3c; }

table {
  border-collapse: collapse;
  width: 100%;
  background: white;
  margin-top: 15px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

th { 
  background: #333; 
  color: white;
}

.boton-mes {
  padding: 8px 15px;
  margin-right: 5px;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  background: #eee;
}

.activo {
  background: #000;
  color: white;
}

input, select {
  padding: 8px;
  border-radius: 4px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- MAPA -->
<div id="mapaContainer">
  <div id="mapa"></div>
</div>

<h1>Estado Sumideros</h1>

<h3>Mes:</h3>
<div id="meses"></div>

<br>

<label><b>Filtrar por empresa:</b></label><br>
<select id="filtroEmpresa">
  <option value="">Todas</option>
  <option value="UTE">UTE</option>
  <option value="RC">RC</option>
  <option value="Automat">Automat</option>
  <option value="DASA">DASA</option>
  <option value="Alemarsa">Alemarsa</option>
</select>

<br>
<input type="text" id="buscador" placeholder="Buscar por calle...">
<input type="text" id="buscadorAltura" placeholder="Buscar por altura...">

<h2>Indicador gráfico</h2>
<div style="width:25vw; max-width:320px; background: white; padding: 15px; border-radius: 8px;">
  <canvas id="grafico"></canvas>
</div>

<h2>Resumen por empresa</h2>
<div id="resumen">Cargando...</div>

<h2>Elementos</h2>
<div style="overflow-x: auto;">
  <table>
    <thead><tr id="headers"></tr></thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>

// ================= CONFIG ORIGINAL =================

const urlsPorMes = {
  "ENERO": "https://docs.google.com/spreadsheets/d/1loohYDVKwKe86YL_F5FKgpomi9HJcnd8MUouRgCBS0Q/export?format=csv",
  "FEBRERO": "https://docs.google.com/spreadsheets/d/1PWL289FN7BRAF4Vcvs3hdxcvdCxP4Vyt0BniCpng4l8/export?format=csv",
  "MARZO": "https://docs.google.com/spreadsheets/d/1kn-haRJBsVdhUFRyDP1h3nfF3tGgf2JF1CRfw7WN0sY/export?format=csv",
  "ABRIL": "https://docs.google.com/spreadsheets/d/15SPpa4npSejN88JwsCX8hou7yDbK_aejhn6ZyIviQSE/export?format=csv&gid=0"
};

const columnasAExcluir = [
  "Ano","Mes","Dia","A verificar","N° Verificacion","Fecha Verificion",
  "Verificador","Mes de verificacion","Mes de verificacion (OCULTAR)"
];

let mesActual = "ABRIL";
let datosGlobal = [];
let empresaActual = "";
let chart;

const ordenEmpresas = ["UTE","RC","Automat","DASA","Alemarsa"];

// ================= MAPA =================

const urlCoordenadas = "https://docs.google.com/spreadsheets/d/1YAXWdz3R7XSSoy0eamS2nSKrj57bhQST/export?format=csv&gid=2083575138";

let mapa;
let marcadoresLayer;
let coordenadas = {};

function limpiarTexto(t){
  return String(t || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

function cargarCoordenadas(){
  return fetch(urlCoordenadas)
    .then(r => r.text())
    .then(csv => {
      const data = Papa.parse(csv, {header:true}).data;

      data.forEach(d => {

        const id = limpiarTexto(d["n_sum"]);
        const coord = d["coordenada"];

        if (id && coord && coord.includes(",")){

          const partes = coord.split(",");

          const lat = parseFloat(partes[0].trim());
          const lon = parseFloat(partes[1].trim());

          if (!isNaN(lat) && !isNaN(lon)){
            coordenadas[id] = {lat, lon};
          }
        }
      });

      console.log("Coordenadas cargadas:", Object.keys(coordenadas).length);
    });
}

function initMapa(){
  mapa = L.map('mapa', {zoomControl:false}).setView([-34.60,-58.38], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

  marcadoresLayer = L.layerGroup().addTo(mapa);
}

function actualizarMapa(data){
  if (!mapa) return;

  marcadoresLayer.clearLayers();

  let bounds = [];

  data.forEach(d => {
    const id = limpiarTexto(d["N° Sumidero"]);
    const coord = coordenadas[id];

    if (coord){
      const estado = limpiarTexto(d["Estado Sumidero"]);
      const color = estado === "Limpio" ? "green" : "red";

      const marker = L.circleMarker([coord.lat, coord.lon], {
        radius: 4,
        color: color,
        fillOpacity: 0.8
      });

      marcadoresLayer.addLayer(marker);
      bounds.push([coord.lat, coord.lon]);
    }
  });

  if (bounds.length){
    mapa.fitBounds(bounds, {padding:[10,10]});
  }
}

// ================= RESTO ORIGINAL =================

// (TODO tu código original sigue igual aquí: cargarDatos, generarResumen, tabla, gráfico, etc.)

function actualizarVista(){
  let data = datosGlobal;

  if (empresaActual)
    data = data.filter(d => limpiarTexto(d["Empresa"]) === limpiarTexto(empresaActual));

  const txtC = limpiarTexto(document.getElementById("buscador").value).toLowerCase();
  if (txtC)
    data = data.filter(d => limpiarTexto(d["Calle"]).toLowerCase().includes(txtC));

  const txtA = limpiarTexto(document.getElementById("buscadorAltura").value).toLowerCase();
  if (txtA)
    data = data.filter(d => limpiarTexto(d["Altura"] || d["Altura Calle"] || "").toLowerCase().includes(txtA));

  generarResumen(data);
  generarTabla(data.slice(0,100));
  actualizarGrafico(data);

  // 🔥 agregado
  actualizarMapa(data);
}

// ================= START =================

Promise.all([
  cargarCoordenadas()
]).then(() => {
  initMapa();
  cargarDatos(mesActual);
});

</script>

</body>
</html>
