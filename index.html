<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Sumideros</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- MAPA -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #FFD700;
}

.card {
  display: inline-block;
  padding: 15px;
  margin: 5px;
  border-radius: 8px;
  background: white;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  text-align: center;
}

.ok { border-left: 10px solid #2ecc71; }
.bad { border-left: 10px solid #e74c3c; }

table {
  border-collapse: collapse;
  width: 100%;
  background: white;
  margin-top: 15px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

th { 
  background: #333; 
  color: white;
}

.boton-mes {
  padding: 8px 15px;
  margin-right: 5px;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  background: #eee;
}

.activo {
  background: #000;
  color: white;
}

input, select {
  padding: 8px;
  border-radius: 4px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>Estado Sumideros</h1>

<h3>Mes:</h3>
<div id="meses"></div>

<br>

<label><b>Filtrar por empresa:</b></label><br>
<select id="filtroEmpresa">
  <option value="">Todas</option>
  <option value="UTE">UTE</option>
  <option value="RC">RC</option>
  <option value="Automat">Automat</option>
  <option value="DASA">DASA</option>
  <option value="Alemarsa">Alemarsa</option>
</select>

<br>
<input type="text" id="buscador" placeholder="Buscar por calle...">
<input type="text" id="buscadorAltura" placeholder="Buscar por altura...">

<h2>Indicador gráfico</h2>
<div style="width:25vw; max-width:320px; background: white; padding: 15px; border-radius: 8px;">
  <canvas id="grafico"></canvas>
</div>

<h2>Mapa de Sumideros</h2>
<div id="mapa" style="height: 400px; width: 100%; border-radius: 8px; margin-bottom:20px;"></div>

<h2>Resumen por empresa</h2>
<div id="resumen">Cargando...</div>

<h2>Elementos</h2>
<div style="overflow-x: auto;">
  <table>
    <thead><tr id="headers"></tr></thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>

// ================= DATOS =================

const urlsPorMes = {
  "ENERO": "https://docs.google.com/spreadsheets/d/1loohYDVKwKe86YL_F5FKgpomi9HJcnd8MUouRgCBS0Q/export?format=csv",
  "FEBRERO": "https://docs.google.com/spreadsheets/d/1PWL289FN7BRAF4Vcvs3hdxcvdCxP4Vyt0BniCpng4l8/export?format=csv",
  "MARZO": "https://docs.google.com/spreadsheets/d/1kn-haRJBsVdhUFRyDP1h3nfF3tGgf2JF1CRfw7WN0sY/export?format=csv",
  "ABRIL": "https://docs.google.com/spreadsheets/d/15SPpa4npSejN88JwsCX8hou7yDbK_aejhn6ZyIviQSE/export?format=csv&gid=0"
};

const urlCoordenadas = "https://docs.google.com/spreadsheets/d/1YAXWdz3R7XSSoy0eamS2nSKrj57bhQST/export?format=csv&gid=2083575138";

// ================= CONFIG =================

const columnasAExcluir = [
  "Ano","Mes","Dia","A verificar","N° Verificacion","Fecha Verificion",
  "Verificador","Mes de verificacion","Mes de verificacion (OCULTAR)"
];

let mesActual = "ABRIL";
let datosGlobal = [];
let empresaActual = "";
let chart;

const ordenEmpresas = ["UTE","RC","Automat","DASA","Alemarsa"];

// MAPA
let mapa;
let marcadoresLayer;
let coordenadas = {};

// ================= INIT =================

function limpiarTexto(t){
  return String(t || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

// ================= MAPA =================

function cargarCoordenadas(){
  return fetch(urlCoordenadas)
    .then(r => r.text())
    .then(csv => {
      const data = Papa.parse(csv, {header:true}).data;
      data.forEach(d => {
        const key = limpiarTexto(d["n_sum"]);
        if (key) {
          coordenadas[key] = {
            lat: parseFloat(d["lat"]),
            lon: parseFloat(d["lon"])
          };
        }
      });
    });
}

function inicializarMapa(){
  mapa = L.map('mapa').setView([-34.60, -58.38], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(mapa);

  marcadoresLayer = L.layerGroup().addTo(mapa);
}

function actualizarMapa(data){
  if (!mapa) return;

  marcadoresLayer.clearLayers();

  data.forEach(d => {
    const id = limpiarTexto(d["N° Sumidero"]);
    const coord = coordenadas[id];

    if (coord && !isNaN(coord.lat) && !isNaN(coord.lon)) {

      const estado = limpiarTexto(d["Estado Sumidero"]);
      const color = estado === "Limpio" ? "green" : "red";

      const marker = L.circleMarker([coord.lat, coord.lon], {
        radius: 6,
        color: color,
        fillOpacity: 0.8
      });

      marker.bindPopup(`
        <b>${id}</b><br>
        Estado: ${estado}<br>
        Empresa: ${d["Empresa"] || ""}
      `);

      marcadoresLayer.addLayer(marker);
    }
  });
}

// ================= DATOS =================

function cargarDatos(mes){
  document.getElementById("resumen").innerHTML = "Cargando...";

  if (mes === "GLOBAL") {
    const promesas = Object.values(urlsPorMes).map(url =>
      fetch(url).then(r => r.text()).then(csv => Papa.parse(csv,{header:true}).data)
    );

    Promise.all(promesas).then(resultados => {
      let combinado = [];
      resultados.forEach(data => {
        combinado = combinado.concat(data);
      });
      datosGlobal = combinado.filter(d => d && Object.keys(d).length > 1);
      actualizarVista();
    });
    return;
  }

  fetch(urlsPorMes[mes])
    .then(r => r.text())
    .then(csv => {
      const data = Papa.parse(csv,{header:true}).data;
      datosGlobal = data.filter(d => d && Object.keys(d).length > 1);
      actualizarVista();
    });
}

// ================= UI =================

const contMeses = document.getElementById("meses");

["GLOBAL", ...Object.keys(urlsPorMes)].forEach(mes => {
  const btn = document.createElement("button");
  btn.innerText = mes;
  btn.className = "boton-mes";
  if (mes === mesActual) btn.classList.add("activo");

  btn.onclick = () => {
    mesActual = mes;
    document.querySelectorAll(".boton-mes").forEach(b => b.classList.remove("activo"));
    btn.classList.add("activo");
    cargarDatos(mes);
  };

  contMeses.appendChild(btn);
});

document.getElementById("filtroEmpresa").addEventListener("change", e => {
  empresaActual = e.target.value;
  actualizarVista();
});

["buscador","buscadorAltura"].forEach(id => {
  document.getElementById(id).addEventListener("input", () => {
    actualizarVista();
  });
});

// ================= VISTA =================

function actualizarVista(){

  let data = datosGlobal;

  if (empresaActual)
    data = data.filter(d => limpiarTexto(d["Empresa"]) === limpiarTexto(empresaActual));

  const txtC = limpiarTexto(document.getElementById("buscador").value).toLowerCase();
  if (txtC)
    data = data.filter(d => limpiarTexto(d["Calle"]).toLowerCase().includes(txtC));

  const txtA = limpiarTexto(document.getElementById("buscadorAltura").value).toLowerCase();
  if (txtA)
    data = data.filter(d => limpiarTexto(d["Altura"] || "").toLowerCase().includes(txtA));

  generarResumen(data);
  generarTabla(data.slice(0,100));
  actualizarGrafico(data);
  actualizarMapa(data);
}

// ================= RESUMEN =================

function generarResumen(data){
  const r = {};

  data.forEach(d => {
    const emp = limpiarTexto(d["Empresa"]);
    const est = limpiarTexto(d["Estado Sumidero"]);

    if (!emp) return;

    if (!r[emp]) r[emp] = {limpios:0,c28:0};

    if (est === "Limpio") r[emp].limpios++;
    if (est === "Cod. 28") r[emp].c28++;
  });

  let html = "";

  ordenEmpresas.forEach(emp => {
    const key = limpiarTexto(emp);
    if (!r[key]) return;

    const {limpios,c28} = r[key];
    const visitas = limpios + c28;

    html += `<div class="card">
      <b>${emp}</b><br><br>
      🟢 ${limpios}<br>
      🔴 ${c28}<br>
      📍 ${visitas}
    </div>`;
  });

  document.getElementById("resumen").innerHTML = html;
}

// ================= TABLA =================

function generarTabla(data){
  const t = document.getElementById("tabla");
  const h = document.getElementById("headers");

  t.innerHTML = "";
  h.innerHTML = "";

  if (!data.length) return;

  const headersValidos = Object.keys(data[0]).filter(k => !columnasAExcluir.includes(k));

  headersValidos.forEach(k => h.innerHTML += `<th>${k}</th>`);

  data.forEach(d => {
    let row = "<tr>";
    headersValidos.forEach(k => row += `<td>${d[k] || ""}</td>`);
    row += "</tr>";
    t.innerHTML += row;
  });
}

// ================= GRAFICO =================

function actualizarGrafico(data){

  const labels = [];
  const limpios = [];
  const cod28 = [];

  ordenEmpresas.forEach(emp => {
    const subset = data.filter(d => limpiarTexto(d["Empresa"]) === limpiarTexto(emp));

    if (!subset.length) return;

    labels.push(emp);
    limpios.push(subset.filter(d => limpiarTexto(d["Estado Sumidero"])==="Limpio").length);
    cod28.push(subset.filter(d => limpiarTexto(d["Estado Sumidero"])==="Cod. 28").length);
  });

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: "bar",
    data: {
      labels,
      datasets: [
        {label:"Limpios", data: limpios, backgroundColor:"green"},
        {label:"Cod.28", data: cod28, backgroundColor:"red"}
      ]
    }
  });
}

// ================= START =================

Promise.all([
  cargarCoordenadas()
]).then(() => {
  inicializarMapa();
  cargarDatos(mesActual);
});

</script>

</body>
</html>
